<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WallWoW – Corner Room Viewer</title>
  <link rel="stylesheet" href="style.css" />

  <!--
    To run locally:
      python3 -m http.server 8080
    Then open: http://localhost:8080

    Place your images in assets/:
      assets/left.png   → left wall
      assets/right.png  → right wall
      assets/top.png    → ceiling
  -->
  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
      "lil-gui":       "https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.esm.js"
    }
  }
  </script>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="info">Left-drag: Rotate &nbsp;|&nbsp; Scroll: Zoom &nbsp;|&nbsp; Right-drag: Pan</div>
  <script type="module" src="main.js"></script>
</body>
</html>
